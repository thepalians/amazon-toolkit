server {
    listen 80;
    server_name palians.com www.palians.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name palians.com www.palians.com;

    ssl_certificate     /etc/letsencrypt/live/palians.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/palians.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ---- React frontend (static build) ----
    location /amazon-seller-toolkit/ {
        alias /var/www/palians/amazon-seller-toolkit/frontend/build/;
        try_files $uri $uri/ /amazon-seller-toolkit/index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ---- Backend API ----
    location /amazon-seller-toolkit/api/ {
        rewrite ^/amazon-seller-toolkit/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}
